<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kube Woodworks — Crofton, Nebraska</title>
  <meta name="description" content="Custom heirloom woodworking by Dave Kube. Handcrafted furniture and one-of-a-kind pieces made in Crofton, Nebraska.">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/k-mark-512.png">
  <link rel="apple-touch-icon" href="assets/k-mark-512.png">
  <link rel="manifest" href="assets/site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="site-nav" aria-label="Site navigation">
    <a class="nav-home" href="index.html" aria-label="Kube Woodworks home">
      <img src="assets/k-mark-512.png" alt="">
      <span class="nav-wordmark">Kube Woodworks</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" aria-current="page">Home</a></li>
      <li><a href="catalogue.html">Catalogue</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- ── Gallery ── -->
  <!-- Pieces are built automatically from data.js — edit that file, not this one -->
  <main class="gallery-stage" id="gallery">

    <div class="gallery-controls" aria-label="Gallery navigation">
      <button class="gallery-btn" id="prev-btn" aria-label="Previous piece" disabled>&#8592;</button>
      <span class="gallery-counter" aria-live="polite">
        <span id="count-current">1</span>&thinsp;/&thinsp;<span id="count-total">1</span>
      </span>
      <button class="gallery-btn" id="next-btn" aria-label="Next piece" disabled>&#8594;</button>
    </div>

  </main>

  <script src="data.js"></script>
  <script>
    (function () {

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function buildPiece(p, index) {
        var num = String(index + 1).padStart(3, '0');

        var photoHTML = p.photo
          ? '<img src="' + esc(p.photo) + '" alt="' + esc(p.photoAlt || p.title) + '">'
          : '<div class="piece-photo-placeholder" aria-hidden="true">' +
              '<img src="assets/k-mark-512.png" alt="">' +
              '<p>Photo coming soon</p>' +
            '</div>';

        var availHTML = p.available
          ? '<span class="avail-badge available">Available</span>' +
            '<p class="avail-message">Ready for local pickup in Crofton, NE. Cash, check, or Venmo. No shipping — regional sales only.</p>' +
            '<a href="contact.html" class="btn">Contact Dave to arrange →</a>'
          : '<span class="avail-badge unavailable">Not available</span>' +
            '<p class="avail-message">Not currently in stock — contact Dave for an estimate on when a similar piece could be ready.</p>' +
            '<a href="contact.html" class="btn">Inquire →</a>';

        var article = document.createElement('article');
        article.className = 'piece';
        article.setAttribute('data-piece', '');
        article.setAttribute('aria-label', 'Piece ' + (index + 1));
        article.innerHTML =
          '<div class="piece-photo">' + photoHTML + '</div>' +
          '<div class="piece-placard">' +
            '<p class="piece-number">No. ' + num + '</p>' +
            '<h1 class="piece-title">' + esc(p.title) + '</h1>' +
            '<dl class="piece-meta">' +
              '<dt>Wood</dt><dd>' + esc(p.wood) + '</dd>' +
              '<dt>Dimensions</dt><dd>' + esc(p.dimensions) + '</dd>' +
              '<dt>Finish</dt><dd>' + esc(p.finish) + '</dd>' +
              '<dt>Year</dt><dd>' + esc(p.year) + '</dd>' +
            '</dl>' +
            '<p class="piece-description">' + esc(p.description) + '</p>' +
            '<div class="piece-availability">' + availHTML + '</div>' +
          '</div>';
        return article;
      }

      var stage    = document.getElementById('gallery');
      var controls = document.querySelector('.gallery-controls');
      var btnPrev  = document.getElementById('prev-btn');
      var btnNext  = document.getElementById('next-btn');
      var numCur   = document.getElementById('count-current');
      var numTot   = document.getElementById('count-total');
      var current  = 0;
      var pieces   = [];

      // Build pieces from data.js
      KUBE.pieces.forEach(function (p, i) {
        var el = buildPiece(p, i);
        stage.insertBefore(el, controls);
        pieces.push(el);
      });

      numTot.textContent = pieces.length;

      function show(idx) {
        pieces[current].classList.remove('active');
        current = idx;
        pieces[current].classList.add('active');
        numCur.textContent = current + 1;
        btnPrev.disabled   = current === 0;
        btnNext.disabled   = current === pieces.length - 1;
        var placard = pieces[current].querySelector('.piece-placard');
        if (placard) placard.scrollTop = 0;
      }

      if (pieces.length > 0) {
        pieces[0].classList.add('active');
        btnPrev.disabled = true;
        btnNext.disabled = pieces.length < 2;
      }

      btnPrev.addEventListener('click', function () { if (current > 0) show(current - 1); });
      btnNext.addEventListener('click', function () { if (current < pieces.length - 1) show(current + 1); });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft'  && current > 0)                 show(current - 1);
        if (e.key === 'ArrowRight' && current < pieces.length - 1) show(current + 1);
      });

      var touchStartX = 0;
      document.addEventListener('touchstart', function (e) {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });
      document.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 48) {
          if (dx < 0 && current < pieces.length - 1) show(current + 1);
          if (dx > 0 && current > 0)                 show(current - 1);
        }
      }, { passive: true });

    }());
  </script>

</body>
</html>
